# Render Blueprint - 自动部署配置
# 连接 GitHub 后 Render 自动读取此文件

services:
  - type: web
    name: xiaonuan
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -b 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com/v1
      - key: MODEL_NAME
        value: deepseek-v4-flash
      - key: MAX_CONTEXT_TOKENS
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.13.0"
